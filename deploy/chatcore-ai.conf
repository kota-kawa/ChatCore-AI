upstream chatcore_backend {
    include /etc/nginx/chatcore-ai/upstreams/backend_active.conf;
    keepalive 32;
}

upstream chatcore_frontend {
    include /etc/nginx/chatcore-ai/upstreams/frontend_active.conf;
    keepalive 32;
}

server {
    server_name chatcore-ai.com www.chatcore-ai.com;

    # Gemini streaming chat endpoint
    location = /api/chat {
        proxy_pass http://chatcore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Request-ID $request_id always;
    }

    # Backend API and Auth routes (Priority to match longer paths)
    location ~ ^/(api|admin/api|memo/api|prompt_share/api|prompt_manage/api|prompt_manage/api|search|google-login|google-callback|logout) {
        proxy_pass http://chatcore_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        add_header X-Request-ID $request_id always;
    }

    # Frontend (Next.js) - Default
    location / {
        proxy_pass http://chatcore_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        add_header X-Request-ID $request_id always;
    }

    client_max_body_size 500M;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chatcore-ai.com-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chatcore-ai.com-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.chatcore-ai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = chatcore-ai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name chatcore-ai.com www.chatcore-ai.com;
    return 404; # managed by Certbot
}
