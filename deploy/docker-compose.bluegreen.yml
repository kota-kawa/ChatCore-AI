name: chatcore-ai

services:
  db:
    image: pgvector/pgvector:0.8.4-pg15
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # マルチワーカー化で増える同時接続に備えた基本チューニング。
    # Blue/Green では一時的に blue+green の両方が DB を共有するため、
    # max_connections は (2 * ワーカー数 * DB_POOL_MAX_CONN) + 予備を満たすよう余裕を持たせる。
    # Baseline tuning for the higher concurrency that multi-worker brings.
    # During Blue/Green both colors briefly share the DB, so size max_connections for
    # (2 * workers * DB_POOL_MAX_CONN) + headroom.
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-512MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-1536MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-16MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
      - -c
      - log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_MS:-500}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7.4.7
    container_name: redis_cache
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # volatile-lru: TTL付きキーのみ退避対象とし、セッション等が消えるのを防ぐ。
    # volatile-lru evicts only keys with a TTL so sessions are not silently dropped.
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-4gb}
      --maxmemory-policy volatile-lru
      --appendonly yes
      --appendfsync everysec
      --save ""
      --tcp-keepalive 300
      --loglevel notice
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  nginx_bootstrap:
    image: alpine:3.20.8
    environment:
      NGINX_UPSTREAM_DIR: ${NGINX_UPSTREAM_DIR:-/etc/nginx/chatcore-ai/upstreams}
      NGINX_BOOTSTRAP_COLOR: ${NGINX_BOOTSTRAP_COLOR:-blue}
    volumes:
      - ${NGINX_UPSTREAM_DIR:-/etc/nginx/chatcore-ai/upstreams}:${NGINX_UPSTREAM_DIR:-/etc/nginx/chatcore-ai/upstreams}
    command:
      - /bin/sh
      - -ceu
      - |
        case "$$NGINX_BOOTSTRAP_COLOR" in
          blue)
            backend_port=5004
            frontend_port=3000
            ;;
          green)
            backend_port=5005
            frontend_port=3001
            ;;
          *)
            echo "Unsupported NGINX_BOOTSTRAP_COLOR: $$NGINX_BOOTSTRAP_COLOR" >&2
            exit 1
            ;;
        esac
        mkdir -p "$$NGINX_UPSTREAM_DIR"
        printf 'server 127.0.0.1:%s;\n' "$$backend_port" > "$$NGINX_UPSTREAM_DIR/backend_active.conf"
        printf 'server 127.0.0.1:%s;\n' "$$frontend_port" > "$$NGINX_UPSTREAM_DIR/frontend_active.conf"
    restart: "no"

  app_blue: &app_service
    build:
      context: ..
      dockerfile: Dockerfile
    image: chat-core-app:latest
    container_name: chatcore_app_blue
    environment:
      - PYTHONUNBUFFERED=1
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_ADDRESS=${RESEND_FROM_ADDRESS}
      - GROQ_MODEL=${GROQ_MODEL:-openai/gpt-oss-120b}
      - GEMINI_DEFAULT_MODEL=${GEMINI_DEFAULT_MODEL:-gemini-2.5-flash}
      - LLM_DAILY_API_LIMIT=${LLM_DAILY_API_LIMIT:-300}
      - BRAVE_WEB_SEARCH_MONTHLY_LIMIT=${BRAVE_WEB_SEARCH_MONTHLY_LIMIT:-500}
      - AI_AGENT_MONTHLY_API_LIMIT=${AI_AGENT_MONTHLY_API_LIMIT:-1000}
      - AUTH_EMAIL_DAILY_SEND_LIMIT=${AUTH_EMAIL_DAILY_SEND_LIMIT:-50}
      - GUEST_CHAT_DAILY_LIMIT=${GUEST_CHAT_DAILY_LIMIT:-10}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-127.0.0.1,::1}
      - FASTAPI_SECRET_KEY=${FASTAPI_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID:-}
      - GOOGLE_JS_ORIGIN=${GOOGLE_JS_ORIGIN:-https://chatcore-ai.com}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - PORT=5004
      - FRONTEND_URL=${FRONTEND_URL:-https://chatcore-ai.com}
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_POOL_MIN_CONN=${DB_POOL_MIN_CONN:-1}
      - DB_POOL_MAX_CONN=${DB_POOL_MAX_CONN:-10}
      - DB_POOL_ACQUIRE_TIMEOUT_SECONDS=${DB_POOL_ACQUIRE_TIMEOUT_SECONDS:-10}
      # uvicorn ワーカー数。Blue/Green では blue+green が同時稼働しうる点も踏まえ、
      # 2 * WEB_CONCURRENCY * DB_POOL_MAX_CONN < Postgres max_connections を維持すること。
      # uvicorn workers. Because blue+green can run together during a switch, keep
      # 2 * WEB_CONCURRENCY * DB_POOL_MAX_CONN < Postgres max_connections.
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - RUN_BLOCKING_MAX_WORKERS=${RUN_BLOCKING_MAX_WORKERS:-64}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FASTAPI_ENV=production
      - FASTAPI_DEBUG=0
      - LOG_OUTPUT=${LOG_OUTPUT:-json}
    ports:
      # ホスト側 nginx からのみアクセスするためループバックに限定する
      # Bind to loopback only; the host nginx is the sole external consumer.
      - "127.0.0.1:5004:5004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:5004/readyz').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

  app_green:
    <<: *app_service
    container_name: chatcore_app_green
    ports:
      - "127.0.0.1:5005:5004"

  frontend_blue: &frontend_service
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${FRONTEND_URL:-https://chatcore-ai.com}
    image: chat-core-frontend:latest
    container_name: chatcore_frontend_blue
    environment:
      - BACKEND_URL=${FRONTEND_URL:-https://chatcore-ai.com}
    ports:
      # ホスト側 nginx からのみアクセスするためループバックに限定する
      # Bind to loopback only; the host nginx is the sole external consumer.
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

  frontend_green:
    <<: *frontend_service
    container_name: chatcore_frontend_green
    ports:
      - "127.0.0.1:3001:3000"

volumes:
  db_data:
  redis_data:
