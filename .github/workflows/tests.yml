name: CI Quality

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff Lint (Light)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run light lint checks
        run: |
          set -euo pipefail
          python -m ruff check app.py blueprints services tests --select E9,F63,F7,F82

  unittest:
    name: Unit Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests excluding session middleware module
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' ! -name 'test_session_middleware.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi
          python -m unittest -v "${unit_modules[@]}"

      - name: Run session middleware smoke test
        run: |
          set -euo pipefail
          export TEST_NAME="tests.unit.test_session_middleware.RedisSessionMiddlewareTest.test_session_roundtrip_via_redis"
          set +e
          timeout 60s python - <<'PY'
          import os
          import unittest

          suite = unittest.defaultTestLoader.loadTestsFromName(os.environ["TEST_NAME"])
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
          status=$?
          set -e
          if [ "${status}" -ne 0 ]; then
            if [ "${status}" -eq 124 ]; then
              echo "Session middleware smoke test timed out after 60 seconds." >&2
            fi
            exit "${status}"
          fi

  integration_tests:
    name: Integration Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run integration tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/integration -p "test_*.py" -t . -v

  coverage:
    name: Coverage Report (Python 3.12)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' ! -name 'test_session_middleware.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi

          python -m coverage erase
          python -m coverage run -m unittest -v "${unit_modules[@]}"
          python -m coverage run --append -m unittest discover -s tests/integration -p "test_*.py" -t . -v

      - name: Show coverage report
        run: |
          set -euo pipefail
          python -m coverage report -m --omit="tests/*"

      - name: Export coverage XML
        run: |
          set -euo pipefail
          python -m coverage xml -o coverage.xml --omit="tests/*"

      - name: Upload coverage artifact
        if: hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend_checks:
    name: Frontend Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend import resolution
        working-directory: frontend
        run: npm run check:imports

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

  docker_backend_build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build -t chat-core-backend-ci:latest .

  docker_frontend_build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          set -euo pipefail
          docker build \
            -f frontend/Dockerfile \
            --build-arg BACKEND_URL=http://app:5004 \
            -t chat-core-frontend-ci:latest \
            ./frontend

  session_middleware_quarantine:
    name: Session Middleware Fallback Tests (Quarantined)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run quarantined session middleware fallback tests
        run: |
          set -euo pipefail
          export TEST_NAME="tests.unit.test_session_middleware.RedisSessionMiddlewareTest.test_session_falls_back_to_cookie_when_redis_unavailable"
          set +e
          timeout 60s python - <<'PY'
          import os
          import unittest

          suite = unittest.defaultTestLoader.loadTestsFromName(os.environ["TEST_NAME"])
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
          status=$?
          set -e
          if [ "${status}" -ne 0 ]; then
            if [ "${status}" -eq 124 ]; then
              echo "Quarantined fallback test timed out after 60 seconds." >&2
            fi
            exit "${status}"
          fi

          export TEST_NAME="tests.unit.test_session_middleware.RedisSessionMiddlewareTest.test_session_falls_back_to_cookie_when_redis_write_fails"
          set +e
          timeout 60s python - <<'PY'
          import os
          import unittest

          suite = unittest.defaultTestLoader.loadTestsFromName(os.environ["TEST_NAME"])
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
          status=$?
          set -e
          if [ "${status}" -ne 0 ]; then
            if [ "${status}" -eq 124 ]; then
              echo "Quarantined write-failure test timed out after 60 seconds." >&2
            fi
            exit "${status}"
          fi

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs: [lint, unittest, integration_tests, frontend_checks, docker_backend_build, docker_frontend_build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          NGINX_SITE_PATH: ${{ secrets.NGINX_SITE_PATH }}
          NGINX_UPSTREAM_DIR: ${{ secrets.NGINX_UPSTREAM_DIR }}
          NGINX_RELOAD_CMD: ${{ secrets.NGINX_RELOAD_CMD }}
          # App Environment Variables (ensure these are set in GitHub Secrets)
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          Gemini_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEND_ADDRESS: ${{ secrets.SEND_ADDRESS }}
          SEND_PASSWORD: ${{ secrets.SEND_PASSWORD }}
          FASTAPI_SECRET_KEY: ${{ secrets.FASTAPI_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          EMAIL_SEND_PASSWORD: ${{ secrets.EMAIL_SEND_PASSWORD }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL || 'https://chatcore-ai.com' }}
        run: |
          set -Eeuo pipefail
          port="${SERVER_PORT:-22}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"

          # Create a temporary env file to pass secrets securely
          cat <<EOF > .env.ci
          POSTGRES_DB='${POSTGRES_DB}'
          POSTGRES_USER='${POSTGRES_USER}'
          POSTGRES_PASSWORD='${POSTGRES_PASSWORD}'
          GROQ_API_KEY='${GROQ_API_KEY}'
          Gemini_API_KEY='${Gemini_API_KEY}'
          SEND_ADDRESS='${SEND_ADDRESS}'
          SEND_PASSWORD='${SEND_PASSWORD}'
          EMAIL_SEND_PASSWORD='${EMAIL_SEND_PASSWORD}'
          FASTAPI_SECRET_KEY='${FASTAPI_SECRET_KEY}'
          GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}'
          GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}'
          ADMIN_PASSWORD_HASH='${ADMIN_PASSWORD_HASH}'
          FRONTEND_URL='${FRONTEND_URL}'
          EOF

          # Upload the secrets file
          scp -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -P "${port}" .env.ci "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/.env.ci"

          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" \
            "export DEPLOY_PATH='${DEPLOY_PATH}' NGINX_SITE_PATH='${NGINX_SITE_PATH}' NGINX_UPSTREAM_DIR='${NGINX_UPSTREAM_DIR}' NGINX_RELOAD_CMD='${NGINX_RELOAD_CMD}'; bash -s" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          cd "${DEPLOY_PATH}"

          # Ensure .env exists
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          
          # Securely merge .env.ci into .env
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              # Remove existing entry if it exists
              sed -i "/^${key}=/d" .env
              # Append the new value
              echo "${key}=${value}" >> .env
            fi
          done < .env.ci
          rm .env.ci

          PREV_COMMIT="$(git rev-parse HEAD)"
          
          diagnose() {
            echo "--- Deployment Diagnostics ---"
            echo "Container Status:"
            docker compose --env-file .env -f deploy/docker-compose.bluegreen.yml ps || true
            echo "Recent Logs for Core Services:"
            docker compose --env-file .env -f deploy/docker-compose.bluegreen.yml logs --tail=50 db redis app_blue app_green frontend_blue frontend_green || true
          }
          
          rollback() {
            echo "Deployment failed. Rolling back to commit ${PREV_COMMIT}..."
            git reset --hard "${PREV_COMMIT}"
            # Note: blue_green_deploy.sh handles its own traffic rollback if it fails mid-way.
          }
          
          on_error() {
            local exit_code=$?
            trap - ERR
            echo "Error occurred during remote deployment execution (Exit Code: ${exit_code})"
            diagnose
            rollback || echo "Warning: Rollback failed or was partial." >&2
            exit "${exit_code}"
          }
          trap on_error ERR

          echo "Fetching latest changes..."
          git fetch origin main
          git reset --hard origin/main

          echo "Starting blue-green deployment..."
          bash ./deploy/blue_green_deploy.sh

          echo "Deployment successful."
          trap - ERR
          REMOTE_SCRIPT
          rm .env.ci
