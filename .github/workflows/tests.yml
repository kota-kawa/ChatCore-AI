name: CI Quality

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.14.6"

jobs:
  version_lock_check:
    name: Version Lock Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-build.txt
            requirements-dev.txt

      - name: Verify lock configuration
        run: |
          set -euo pipefail
          python -m pip install -r requirements-build.txt
          python scripts/check_version_locks.py
          python -m pip install -r requirements.txt -c requirements.lock
          python -m pip freeze --exclude pip --exclude setuptools --exclude wheel | LC_ALL=C sort -f > /tmp/requirements.lock
          diff -u requirements.lock /tmp/requirements.lock

  dependency_audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.lock

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit locked Python dependencies
        run: |
          set -euo pipefail
          python -m pip install pip-audit==2.10.1
          python -m pip_audit --disable-pip --no-deps --progress-spinner=off -r requirements.lock

      - name: Audit production frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev

  lint:
    name: Ruff Lint (Light)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            requirements-dev.txt

      - name: Install ruff
        run: |
          set -euo pipefail
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements-dev.txt

      - name: Run light lint checks
        run: |
          set -euo pipefail
          python -m ruff check app.py blueprints services tests --select E9,F63,F7,F82

  lint_full:
    name: Ruff Lint (Full)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            requirements-dev.txt

      - name: Install ruff
        run: |
          set -euo pipefail
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements-dev.txt

      - name: Run full lint checks
        run: |
          set -euo pipefail
          python -m ruff check app.py blueprints services tests

  unit_test_shards:
    name: Unit Test Shard ${{ matrix.shard_number }}/${{ matrix.shard_total }} (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard_number: [1, 2, 3, 4]
        shard_total: [4]
    env:
      PYTHONFAULTHANDLER: "1"
      UNIT_TEST_SHARD_NUMBER: ${{ matrix.shard_number }}
      UNIT_TEST_SHARD_TOTAL: ${{ matrix.shard_total }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-build.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements.txt -c requirements.lock

      - name: Run unit tests
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            python - <<'PY'
          import os
          from pathlib import Path

          shard_number = int(os.environ["UNIT_TEST_SHARD_NUMBER"])
          shard_total = int(os.environ["UNIT_TEST_SHARD_TOTAL"])
          if shard_number < 1 or shard_number > shard_total:
              raise SystemExit(f"Invalid shard number {shard_number} of {shard_total}")

          test_files = sorted(Path("tests/unit").glob("test_*.py"))
          if not test_files:
              raise SystemExit("No unit test modules were found.")

          buckets = [[] for _ in range(shard_total)]
          bucket_weights = [0] * shard_total
          weighted_files = []
          for path in test_files:
              line_count = sum(1 for _ in path.open(encoding="utf-8"))
              weighted_files.append((line_count, path))

          for line_count, path in sorted(weighted_files, key=lambda item: (-item[0], str(item[1]))):
              bucket_index = min(
                  range(shard_total),
                  key=lambda index: (bucket_weights[index], len(buckets[index]), index),
              )
              buckets[bucket_index].append(path)
              bucket_weights[bucket_index] += line_count

          selected = sorted(buckets[shard_number - 1])
          for path in selected:
              print(path.with_suffix("").as_posix().replace("/", "."))
          PY
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were assigned to shard ${UNIT_TEST_SHARD_NUMBER}/${UNIT_TEST_SHARD_TOTAL}." >&2
            exit 1
          fi
          printf 'Running %d unit test modules in shard %s/%s:\n' \
            "${#unit_modules[@]}" "${UNIT_TEST_SHARD_NUMBER}" "${UNIT_TEST_SHARD_TOTAL}"
          printf '  %s\n' "${unit_modules[@]}"
          python -m unittest -v "${unit_modules[@]}"

  unittest:
    name: Unit Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: unit_test_shards
    if: always()
    timeout-minutes: 5

    steps:
      - name: Verify unit test shards
        run: |
          set -euo pipefail
          if [ "${{ needs.unit_test_shards.result }}" != "success" ]; then
            echo "One or more unit test shards failed." >&2
            exit 1
          fi
          echo "All unit test shards passed."

  integration_tests:
    name: Integration Tests (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-build.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements.txt -c requirements.lock

      - name: Run integration tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/integration -p "test_*.py" -t . -v

  coverage:
    name: Coverage Report (Python 3.14)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements.lock
            requirements-build.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install -r requirements-build.txt
          python -m pip install -r requirements.txt -c requirements.lock
          python -m pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi

          python -m coverage erase
          python -m coverage run -m unittest -v "${unit_modules[@]}"
          python -m coverage run --append -m unittest discover -s tests/integration -p "test_*.py" -t . -v

      - name: Show coverage report
        run: |
          set -euo pipefail
          python -m coverage report -m --omit="tests/*"

      - name: Export coverage XML
        run: |
          set -euo pipefail
          python -m coverage xml -o coverage.xml --omit="tests/*"

      - name: Upload coverage artifact
        if: hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend_checks:
    name: Frontend Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend import resolution
        working-directory: frontend
        run: npm run check:imports

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend logic and component tests
        working-directory: frontend
        run: npm test

  docker_backend_build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Validate deployment configuration and PostgreSQL upgrade guard
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          FASTAPI_SECRET_KEY: ci
          REDIS_PASSWORD: ci
        run: |
          set -euo pipefail
          bash -n deploy/blue_green_deploy.sh deploy/migrate_postgres_15_to_18.sh deploy/test_postgres_upgrade_guard.sh
          docker compose --env-file /dev/null -f docker-compose.yml config --quiet
          docker compose --env-file /dev/null -f deploy/docker-compose.bluegreen.yml config --quiet
          bash deploy/test_postgres_upgrade_guard.sh

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build -t chat-core-backend-ci:latest .

  docker_frontend_build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Build frontend image
        run: |
          set -euo pipefail
          docker build \
            -f frontend/Dockerfile \
            --build-arg BACKEND_URL=http://app:5004 \
            -t chat-core-frontend-ci:latest \
            ./frontend

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs: [version_lock_check, dependency_audit, lint, lint_full, unittest, integration_tests, frontend_checks, docker_backend_build, docker_frontend_build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # The first PostgreSQL 15 -> 18 logical dump/restore can legitimately take
    # longer than an ordinary blue/green application deployment.
    timeout-minutes: 60

    steps:
      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          NGINX_SITE_PATH: ${{ secrets.NGINX_SITE_PATH }}
          NGINX_UPSTREAM_DIR: ${{ secrets.NGINX_UPSTREAM_DIR }}
          NGINX_TEST_CMD: ${{ secrets.NGINX_TEST_CMD }}
          NGINX_RELOAD_CMD: ${{ secrets.NGINX_RELOAD_CMD }}
        run: |
          set -Eeuo pipefail
          port="${SERVER_PORT:-22}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"

          required_vars=(
            SERVER_HOST
            SERVER_USER
            DEPLOY_PATH
          )
          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("${var_name}")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing_vars[*]}" >&2
            exit 1
          fi

          remote_env_names=(
            DEPLOY_PATH
            NGINX_SITE_PATH
            NGINX_UPSTREAM_DIR
            NGINX_TEST_CMD
            NGINX_RELOAD_CMD
          )
          remote_exports=()
          for var_name in "${remote_env_names[@]}"; do
            printf -v escaped_value '%q' "${!var_name:-}"
            remote_exports+=("${var_name}=${escaped_value}")
          done

          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" \
            "export ${remote_exports[*]}; bash -s" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            echo "Required remote env file not found: ${DEPLOY_PATH}/.env" >&2
            exit 1
          fi

          PREV_COMMIT="$(git rev-parse HEAD)"
          
          diagnose() {
            echo "--- Deployment Diagnostics ---"
            echo "Timestamp: $(date -Is)"
            echo "Host: $(hostname)"
            echo "Path: $(pwd)"
            echo "Git HEAD: $(git rev-parse --short HEAD 2>/dev/null || true)"
            echo "Disk Usage:"
            df -h . || true
            echo "Memory Usage:"
            free -h || true
            echo "Docker Version:"
            docker --version || true
            docker compose version || true
            echo "Nginx Command Configuration:"
            printf 'NGINX_SITE_PATH=%s\n' "${NGINX_SITE_PATH:-<unset>}"
            printf 'NGINX_UPSTREAM_DIR=%s\n' "${NGINX_UPSTREAM_DIR:-<unset>}"
            if [ -n "${NGINX_TEST_CMD:-}" ]; then echo "NGINX_TEST_CMD=<set>"; else echo "NGINX_TEST_CMD=<unset>"; fi
            if [ -n "${NGINX_RELOAD_CMD:-}" ]; then echo "NGINX_RELOAD_CMD=<set>"; else echo "NGINX_RELOAD_CMD=<unset>"; fi
            echo "Container Status:"
            docker compose --env-file .env -f deploy/docker-compose.bluegreen.yml ps || true
            echo "Recent Logs for Core Services:"
            docker compose --env-file .env -f deploy/docker-compose.bluegreen.yml logs --tail=50 db redis app_blue app_green frontend_blue frontend_green || true
          }
          
          rollback() {
            echo "Deployment failed. Rolling back to commit ${PREV_COMMIT}..."
            git reset --hard "${PREV_COMMIT}"
            # Note: blue_green_deploy.sh handles its own traffic rollback if it fails mid-way.
          }
          
          on_error() {
            local exit_code=$?
            local line_number="${1:-unknown}"
            trap - ERR
            echo "Error occurred during remote deployment execution at line ${line_number} (Exit Code: ${exit_code})"
            diagnose
            rollback || echo "Warning: Rollback failed or was partial." >&2
            exit "${exit_code}"
          }
          trap 'on_error ${LINENO}' ERR

          echo "Fetching latest changes..."
          git fetch origin main
          git reset --hard origin/main

          echo "Starting blue-green deployment..."
          bash ./deploy/blue_green_deploy.sh

          echo "Deployment successful."
          trap - ERR
          REMOTE_SCRIPT
