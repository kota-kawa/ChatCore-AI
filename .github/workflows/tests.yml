name: CI Quality

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff Lint (Light)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run light lint checks
        run: |
          set -euo pipefail
          python -m ruff check app.py blueprints services tests --select E9,F63,F7,F82

  unittest:
    name: Unit Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests excluding session middleware module
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' ! -name 'test_session_middleware.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi
          python -m unittest -v "${unit_modules[@]}"

      - name: Run session middleware smoke test
        run: |
          set -euo pipefail
          export TEST_NAME="tests.unit.test_session_middleware.RedisSessionMiddlewareTest.test_session_roundtrip_via_redis"
          set +e
          timeout 60s python - <<'PY'
          import os
          import unittest

          suite = unittest.defaultTestLoader.loadTestsFromName(os.environ["TEST_NAME"])
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
          status=$?
          set -e
          if [ "${status}" -ne 0 ]; then
            if [ "${status}" -eq 124 ]; then
              echo "Session middleware smoke test timed out after 60 seconds." >&2
            fi
            exit "${status}"
          fi

  integration_tests:
    name: Integration Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run integration tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/integration -p "test_*.py" -t . -v

  coverage:
    name: Coverage Report (Python 3.12)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' ! -name 'test_session_middleware.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi

          python -m coverage erase
          python -m coverage run -m unittest -v "${unit_modules[@]}"
          python -m coverage run --append -m unittest discover -s tests/integration -p "test_*.py" -t . -v

      - name: Show coverage report
        run: |
          set -euo pipefail
          python -m coverage report -m --omit="tests/*"

      - name: Export coverage XML
        run: |
          set -euo pipefail
          python -m coverage xml -o coverage.xml --omit="tests/*"

      - name: Upload coverage artifact
        if: hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend_checks:
    name: Frontend Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend import resolution
        working-directory: frontend
        run: npm run check:imports

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

  docker_backend_build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build -t chat-core-backend-ci:latest .

  docker_frontend_build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          set -euo pipefail
          docker build \
            -f frontend/Dockerfile \
            --build-arg BACKEND_URL=http://app:5004 \
            -t chat-core-frontend-ci:latest \
            ./frontend

  session_middleware_quarantine:
    name: Session Middleware Fallback Tests (Quarantined)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run quarantined session middleware fallback tests
        run: |
          set -euo pipefail
          export TEST_NAME="tests.unit.test_session_middleware.RedisSessionMiddlewareTest.test_session_falls_back_to_cookie_when_redis_unavailable"
          set +e
          timeout 60s python - <<'PY'
          import os
          import unittest

          suite = unittest.defaultTestLoader.loadTestsFromName(os.environ["TEST_NAME"])
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
          status=$?
          set -e
          if [ "${status}" -ne 0 ]; then
            if [ "${status}" -eq 124 ]; then
              echo "Quarantined fallback test timed out after 60 seconds." >&2
            fi
            exit "${status}"
          fi

          export TEST_NAME="tests.unit.test_session_middleware.RedisSessionMiddlewareTest.test_session_falls_back_to_cookie_when_redis_write_fails"
          set +e
          timeout 60s python - <<'PY'
          import os
          import unittest

          suite = unittest.defaultTestLoader.loadTestsFromName(os.environ["TEST_NAME"])
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
          status=$?
          set -e
          if [ "${status}" -ne 0 ]; then
            if [ "${status}" -eq 124 ]; then
              echo "Quarantined write-failure test timed out after 60 seconds." >&2
            fi
            exit "${status}"
          fi

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs: [lint, unittest, integration_tests, frontend_checks, docker_backend_build, docker_frontend_build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -Eeuo pipefail
          port="${SERVER_PORT:-22}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" "export DEPLOY_PATH='${DEPLOY_PATH}'; bash -s" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          cd "${DEPLOY_PATH}"

          PREV_COMMIT="$(git rev-parse HEAD)"
          diagnose() {
            echo "Deployment diagnostics"
            docker compose ps || true
            docker compose logs app db frontend redis --tail=200 || true
          }
          fail_deploy() {
            echo "$1" >&2
            return 1
          }
          wait_for_service_healthy() {
            service="$1"
            retries="${2:-90}"
            while [ "${retries}" -gt 0 ]; do
              cid="$(docker compose ps -q "${service}")"
              if [ -z "${cid}" ]; then
                fail_deploy "Service ${service} container is missing."
              fi

              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${cid}")"
              if [ "${status}" = "healthy" ]; then
                echo "Service ${service} is ${status}"
                return 0
              fi
              if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ] || [ "${status}" = "dead" ]; then
                fail_deploy "Service ${service} is ${status}"
              fi

              sleep 2
              retries=$((retries - 1))
            done

            fail_deploy "Timed out waiting for service ${service} to become ready."
          }
          probe_backend() {
            docker compose exec -T app python -c "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:5004/readyz').status == 200 else 1)"
          }
          probe_frontend() {
            docker compose exec -T frontend node -e "fetch('http://127.0.0.1:3000/api/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
          }
          wait_for_http_probe() {
            probe_name="$1"
            retries="${2:-30}"
            while [ "${retries}" -gt 0 ]; do
              if "${probe_name}"; then
                echo "${probe_name} passed."
                return 0
              fi
              sleep 2
              retries=$((retries - 1))
            done
            fail_deploy "HTTP readiness probe ${probe_name} failed."
          }
          start_core_services() {
            docker compose up -d db redis
            wait_for_service_healthy db 90
            wait_for_service_healthy redis 90
          }
          build_runtime_images() {
            docker compose build app frontend
          }
          run_migrations() {
            docker compose run --rm app alembic upgrade head
          }
          deploy_app() {
            docker compose up -d --no-deps app
            wait_for_service_healthy app 90
            wait_for_http_probe probe_backend 30
          }
          deploy_frontend() {
            docker compose up -d --no-deps frontend
            wait_for_service_healthy frontend 90
            wait_for_http_probe probe_frontend 30
          }
          rollback() {
            echo "Deploy failed. Rolling back to ${PREV_COMMIT}"
            git reset --hard "${PREV_COMMIT}"
            start_core_services
            build_runtime_images
            docker compose up -d --no-deps app frontend
          }
          on_error() {
            trap - ERR
            diagnose
            rollback || echo "Rollback also failed." >&2
          }
          trap on_error ERR

          git fetch origin main
          git reset --hard origin/main

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example. Please update it with actual secrets."
          fi

          start_core_services
          build_runtime_images
          run_migrations
          deploy_app
          deploy_frontend
          docker compose ps

          trap - ERR
          docker image prune -f || true
          REMOTE_SCRIPT
