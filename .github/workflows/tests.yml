name: CI Quality

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint (Light)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch repository archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1

      - name: Resolve Python 3.11
        env:
          PYTHON_VERSION: "3.11"
        run: |
          set -euo pipefail
          wanted="python${PYTHON_VERSION}"
          if command -v "${wanted}" >/dev/null 2>&1; then
            pybin="$(command -v "${wanted}")"
          else
            pybin="$(ls -1d /opt/hostedtoolcache/Python/${PYTHON_VERSION}*/x64/bin/python 2>/dev/null | sort -V | tail -n 1)"
            if [ -z "${pybin}" ]; then
              echo "Python ${PYTHON_VERSION} was not found on this runner." >&2
              exit 1
            fi
          fi
          echo "PYTHON_BIN=${pybin}" >> "${GITHUB_ENV}"
          "${pybin}" --version

      - name: Install ruff
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m pip install --upgrade pip
          "${PYTHON_BIN}" -m pip install ruff

      - name: Run light lint checks
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m ruff check app.py blueprints services tests --select E9,F63,F7,F82

  unittest:
    name: Unit Tests (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch repository archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1

      - name: Resolve Python 3.11
        env:
          PYTHON_VERSION: "3.11"
        run: |
          set -euo pipefail
          wanted="python${PYTHON_VERSION}"
          if command -v "${wanted}" >/dev/null 2>&1; then
            pybin="$(command -v "${wanted}")"
          else
            pybin="$(ls -1d /opt/hostedtoolcache/Python/${PYTHON_VERSION}*/x64/bin/python 2>/dev/null | sort -V | tail -n 1)"
            if [ -z "${pybin}" ]; then
              echo "Python ${PYTHON_VERSION} was not found on this runner." >&2
              exit 1
            fi
          fi
          echo "PYTHON_BIN=${pybin}" >> "${GITHUB_ENV}"
          "${pybin}" --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m pip install --upgrade pip
          "${PYTHON_BIN}" -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m unittest discover -s tests/unit -p "test_*.py" -t . -v

  integration_tests:
    name: Integration Tests (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch repository archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1

      - name: Resolve Python 3.11
        env:
          PYTHON_VERSION: "3.11"
        run: |
          set -euo pipefail
          wanted="python${PYTHON_VERSION}"
          if command -v "${wanted}" >/dev/null 2>&1; then
            pybin="$(command -v "${wanted}")"
          else
            pybin="$(ls -1d /opt/hostedtoolcache/Python/${PYTHON_VERSION}*/x64/bin/python 2>/dev/null | sort -V | tail -n 1)"
            if [ -z "${pybin}" ]; then
              echo "Python ${PYTHON_VERSION} was not found on this runner." >&2
              exit 1
            fi
          fi
          echo "PYTHON_BIN=${pybin}" >> "${GITHUB_ENV}"
          "${pybin}" --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m pip install --upgrade pip
          "${PYTHON_BIN}" -m pip install -r requirements.txt

      - name: Run integration tests
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m unittest discover -s tests/integration -p "test_*.py" -t . -v

  full_matrix:
    name: Full Suite / Python ${{ matrix.python-version }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Fetch repository archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1

      - name: Resolve Python ${{ matrix.python-version }}
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          wanted="python${PYTHON_VERSION}"
          if command -v "${wanted}" >/dev/null 2>&1; then
            pybin="$(command -v "${wanted}")"
          else
            pybin="$(ls -1d /opt/hostedtoolcache/Python/${PYTHON_VERSION}*/x64/bin/python 2>/dev/null | sort -V | tail -n 1)"
            if [ -z "${pybin}" ]; then
              echo "Python ${PYTHON_VERSION} was not found on this runner." >&2
              exit 1
            fi
          fi
          echo "PYTHON_BIN=${pybin}" >> "${GITHUB_ENV}"
          "${pybin}" --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m pip install --upgrade pip
          "${PYTHON_BIN}" -m pip install -r requirements.txt

      - name: Run full test suite
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m unittest discover -s tests -p "test_*.py" -t . -v

  coverage:
    name: Coverage Report (No Threshold)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch repository archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1

      - name: Resolve Python 3.11
        env:
          PYTHON_VERSION: "3.11"
        run: |
          set -euo pipefail
          wanted="python${PYTHON_VERSION}"
          if command -v "${wanted}" >/dev/null 2>&1; then
            pybin="$(command -v "${wanted}")"
          else
            pybin="$(ls -1d /opt/hostedtoolcache/Python/${PYTHON_VERSION}*/x64/bin/python 2>/dev/null | sort -V | tail -n 1)"
            if [ -z "${pybin}" ]; then
              echo "Python ${PYTHON_VERSION} was not found on this runner." >&2
              exit 1
            fi
          fi
          echo "PYTHON_BIN=${pybin}" >> "${GITHUB_ENV}"
          "${pybin}" --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m pip install --upgrade pip
          "${PYTHON_BIN}" -m pip install -r requirements.txt
          "${PYTHON_BIN}" -m pip install coverage

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m coverage run -m unittest discover -s tests -p "test_*.py" -t .

      - name: Show coverage report
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m coverage report -m --omit="tests/*"

      - name: Export coverage XML
        run: |
          set -euo pipefail
          "${PYTHON_BIN}" -m coverage xml -o coverage.xml --omit="tests/*"

  frontend_imports:
    name: Frontend Import Resolution
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch repository archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1

      - name: Resolve Node 20
        run: |
          set -euo pipefail
          node20_bin="$(ls -1d /opt/hostedtoolcache/node/20*/x64/bin 2>/dev/null | sort -V | tail -n 1)"
          if [ -n "${node20_bin}" ]; then
            echo "${node20_bin}" >> "${GITHUB_PATH}"
          fi

          if ! command -v node >/dev/null 2>&1; then
            echo "Node.js was not found on this runner." >&2
            exit 1
          fi

          if ! node --version | grep -q '^v20\.'; then
            echo "Node.js 20 is required, but found $(node --version)." >&2
            exit 1
          fi

          node --version
          npm --version

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend import resolution
        working-directory: frontend
        run: npm run check:imports

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs: [lint, unittest, integration_tests, full_matrix, coverage, frontend_imports]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          port="${SERVER_PORT:-22}"
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd /var/www/chatcore-ai

          PREV_COMMIT="$(git rev-parse HEAD)"
          rollback() {
            echo "Deploy failed. Rolling back to ${PREV_COMMIT}"
            git reset --hard "${PREV_COMMIT}"
            docker compose up -d --build || true
          }
          trap rollback ERR

          git fetch origin main
          git reset --hard origin/main

          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example. Please update it with actual secrets."
          fi

          docker compose up -d --build

          docker compose ps
          for service in app frontend db redis; do
            cid="$(docker compose ps -q "${service}")"
            if [ -z "${cid}" ]; then
              echo "Service ${service} container is missing."
              exit 1
            fi

            retries=30
            while [ "${retries}" -gt 0 ]; do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${cid}")"
              if [ "${status}" = "healthy" ] || [ "${status}" = "running" ]; then
                echo "Service ${service} is ${status}"
                break
              fi
              if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ] || [ "${status}" = "dead" ]; then
                echo "Service ${service} is ${status}"
                exit 1
              fi
              sleep 2
              retries=$((retries - 1))
            done

            if [ "${retries}" -eq 0 ]; then
              echo "Timed out waiting for service ${service} to become ready."
              exit 1
            fi
          done

          docker image prune -f
          trap - ERR
          REMOTE_SCRIPT
