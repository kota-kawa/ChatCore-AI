name: CI Quality

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff Lint (Light)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run light lint checks
        run: |
          set -euo pipefail
          python -m ruff check app.py blueprints services tests --select E9,F63,F7,F82

  lint_full:
    name: Ruff Lint (Full)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run full lint checks
        run: |
          set -euo pipefail
          python -m ruff check app.py blueprints services tests

  unittest:
    name: Unit Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi
          python -m unittest -v "${unit_modules[@]}"

  integration_tests:
    name: Integration Tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run integration tests
        run: |
          set -euo pipefail
          python -m unittest discover -s tests/integration -p "test_*.py" -t . -v

  coverage:
    name: Coverage Report (Python 3.12)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          mapfile -t unit_modules < <(
            find tests/unit -type f -name 'test_*.py' | sort \
              | sed 's#/#.#g;s#\.py$##'
          )
          if [ "${#unit_modules[@]}" -eq 0 ]; then
            echo "No unit test modules were found." >&2
            exit 1
          fi

          python -m coverage erase
          python -m coverage run -m unittest -v "${unit_modules[@]}"
          python -m coverage run --append -m unittest discover -s tests/integration -p "test_*.py" -t . -v

      - name: Show coverage report
        run: |
          set -euo pipefail
          python -m coverage report -m --omit="tests/*"

      - name: Export coverage XML
        run: |
          set -euo pipefail
          python -m coverage xml -o coverage.xml --omit="tests/*"

      - name: Upload coverage artifact
        if: hashFiles('coverage.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend_checks:
    name: Frontend Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend import resolution
        working-directory: frontend
        run: npm run check:imports

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

  docker_backend_build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build -t chat-core-backend-ci:latest .

  docker_frontend_build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          set -euo pipefail
          docker build \
            -f frontend/Dockerfile \
            --build-arg BACKEND_URL=http://app:5004 \
            -t chat-core-frontend-ci:latest \
            ./frontend

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs: [lint, lint_full, unittest, integration_tests, frontend_checks, docker_backend_build, docker_frontend_build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          NGINX_SITE_PATH: ${{ secrets.NGINX_SITE_PATH }}
          NGINX_UPSTREAM_DIR: ${{ secrets.NGINX_UPSTREAM_DIR }}
          NGINX_RELOAD_CMD: ${{ secrets.NGINX_RELOAD_CMD }}
        run: |
          set -Eeuo pipefail
          port="${SERVER_PORT:-22}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"

          required_vars=(
            SERVER_HOST
            SERVER_USER
            DEPLOY_PATH
          )
          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("${var_name}")
            fi
          done
          if [ "${#missing_vars[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing_vars[*]}" >&2
            exit 1
          fi

          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" \
            "export DEPLOY_PATH='${DEPLOY_PATH}' NGINX_SITE_PATH='${NGINX_SITE_PATH}' NGINX_UPSTREAM_DIR='${NGINX_UPSTREAM_DIR}' NGINX_RELOAD_CMD='${NGINX_RELOAD_CMD}'; bash -s" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            echo "Required remote env file not found: ${DEPLOY_PATH}/.env" >&2
            exit 1
          fi

          PREV_COMMIT="$(git rev-parse HEAD)"
          
          diagnose() {
            echo "--- Deployment Diagnostics ---"
            echo "Container Status:"
            docker compose --env-file .env -f deploy/docker-compose.bluegreen.yml ps || true
            echo "Recent Logs for Core Services:"
            docker compose --env-file .env -f deploy/docker-compose.bluegreen.yml logs --tail=50 db redis app_blue app_green frontend_blue frontend_green || true
          }
          
          rollback() {
            echo "Deployment failed. Rolling back to commit ${PREV_COMMIT}..."
            git reset --hard "${PREV_COMMIT}"
            # Note: blue_green_deploy.sh handles its own traffic rollback if it fails mid-way.
          }
          
          on_error() {
            local exit_code=$?
            trap - ERR
            echo "Error occurred during remote deployment execution (Exit Code: ${exit_code})"
            diagnose
            rollback || echo "Warning: Rollback failed or was partial." >&2
            exit "${exit_code}"
          }
          trap on_error ERR

          echo "Fetching latest changes..."
          git fetch origin main
          git reset --hard origin/main

          echo "Starting blue-green deployment..."
          bash ./deploy/blue_green_deploy.sh

          echo "Deployment successful."
          trap - ERR
          REMOTE_SCRIPT
